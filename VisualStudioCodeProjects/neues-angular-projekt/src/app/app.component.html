<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Beispiel</title>
   
</head>
<body>
  <main class="main">
      <div class="content">
          <div class="header">
              <h1>Willkommen zu meinem Projekt!</h1>
          </div>
          <div class="body">
              <div class="left-side">
                  <p>Hier ist die linke Seite</p>
              </div>
              <div class="divider"></div>
              <div class="right-side">
                  <p>Hier ist die rechte Seite</p>
              </div>
          </div>
          <div class="button-container">
              <button class="button">Klicken Sie hier</button>
          </div>
      </div>
  </main>
</body>
</html>
